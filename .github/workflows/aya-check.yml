name: Aya Interruption Checker

on:
  push:
    branches:
      - main
  schedule:
    - cron: '5,35 * * * *'
  workflow_dispatch:

jobs:
  run-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Opt into Node.js 24 for JavaScript-based GitHub actions
      # to avoid deprecation warnings with actions/checkout@v4 and actions/setup-python@v5.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug trigger source
        run: |
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          if [ -f "$GITHUB_EVENT_PATH" ]; then
            echo "Event JSON content:"
            cat "$GITHUB_EVENT_PATH"
          else
            echo "No GITHUB_EVENT_PATH available"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install requests

      - name: Validate environment and bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python validate_env.py

      - name: Run Aya bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_aya.py

      - name: Commit state file if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "bot@aya.local"
          git config --local user.name "AyA Bot"
          git add estado_anterior.json
          if git diff --staged --quiet; then
            echo "No hay cambios en el estado para commitear"
          else
            git commit -m "Update: estado de interrupciones de agua $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
