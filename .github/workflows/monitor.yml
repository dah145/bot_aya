name: Monitor AyA Costa Rica

on:
  schedule:
    # Se ejecuta cada 30 minutos (Ej: 1:00, 1:30, 2:00...)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite ejecución manual para pruebas

jobs:
  revisar_agua:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar el código
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar el bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_aya.py
